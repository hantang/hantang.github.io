# Site information
site_name: Hantang's Blog
site_url: https://hantang.github.io/
site_author: hantang
site_description: "... write blogs and have fun ..."
copyright: Copyright &copy; 2023-2024 Hantang
# docs_dir: docs/

# Repository
repo_name: hantang/hantang.github.io
repo_url: https://github.com/hantang/hantang.github.io
# edit_uri: tree/main

# Theme
theme:
  name: material
  custom_dir: overrides
  # language: "zh"
  icon:
    logo: material/sprout
    repo: fontawesome/brands/github-alt
  font:
    text: Open Sans, Helvetica Neue, Roboto, sans-serif, serif
    code: Fira Mono, Fira Code, Roboto Mono, monospace
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.prune
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    # - navigation.expand
    # - navigation.sections
    # - navigation.tabs.sticky
    - search.highlight
    - search.suggest
    # - search.share
    - toc.follow
    # - toc.integrate
    - content.code.copy
    # - content.action.edit
    # - content.action.view
    - header.autohide

markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      # toc_depth: 4
      # slugify: !!python/object/apply:pymdownx.slugs.slugify
      #   kwds:
      #     case: lower
      #     percent_encode: true
  # Python Markdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      auto_title: true
      line_spans: __span
      linenums_style: pymdownx-inline
      linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.magiclink
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  # more
  - mdx_truly_sane_lists
  - tables

extra_javascript:
  - assets/js/katex.js
  - https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.7/katex.min.js
  - https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.7/contrib/auto-render.min.js
  # - https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js
  # - https://cdn.jsdelivr.net/npm/webfontloader@1.6.28/webfontloader.js
  - https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js
  - https://unpkg.com/tablesort@5.3.0/dist/sorts/tablesort.number.min.js
  - https://unpkg.com/tablesort@5.3.0/dist/sorts/tablesort.date.min.js
  - assets/js/tablesort.js
  - assets/js/shortcuts.js

extra_css:
  - https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.7/katex.min.css
  # - https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css
  - assets/css/extra.css

extra:
  social:
    - icon: fontawesome/brands/pied-piper-alt
    - icon: fontawesome/solid/rss
      link: https://hantang.github.io/feed_rss_created.xml
    - icon: fontawesome/brands/github
      link: https://github.com/hantang
  # version:
  #   provider: mike

plugins:
  - git-revision-date-localized:
      enable_creation_date: true
  - include-markdown
  - mermaid2
  - table-reader
  - awesome-pages:
      collapse_single_pages: true
      strict: false
      # order: asc
      # sort_type: natural
      # order_by: title
  - blog:
      # blog_dir: .
      blog_toc: true
      authors: true
      pagination_keep_content: true
      pagination_format: "~2~"
      pagination_per_page: 5
      draft_on_serve: true
      post_url_format: "{file}"
      post_date_format: medium
      archive_date_format: yyyy
  - minify:
      minify_html: true
  - search:
      lang:
        - en
        - zh
      separator: '[\s\-,:!=\[\]()"/\u200b]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - tags:
      tags_file: blog/tags.md
  - rss:
      match_path: blogs/posts/.*
      date_from_meta:
        as_creation: date
      categories:
        - categories
        - tags
      abstract_chars_count: 144
      abstract_delimiter: <!-- more -->
      comments_path: "#__comments"
  # - social:
  #     cards_layout: default
  #     cards_layout_options:
  #       font_family: Noto Sans SC

# exclude_docs: |
#   /drafts/

nav:
  - Home: index.md
  - Blog:
      - Posts: blog/index.md
      - Tags: blog/tags.md
  - More:
      - Essays:
          - blog/essays/index.md
          - ... | flat | blog/essays/*.md
      - Archive:
          - blog/archive/index.md
          - ... | flat | blog/archive/*.md
      - Projects:
          - project/index.md
          - ... | flat | project/*.md
      - Misc:
          - ...
  - About:
      - about/index.md
      - ... | flat | about/*.md
