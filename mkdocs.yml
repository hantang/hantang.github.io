# site information
site_name: Hantang's Blog
site_url: https://hantang.github.io/
site_author: hantang
site_description: "... write blogs and have fun ..."
copyright: Copyright &copy; 2023 Hantang
# docs_dir: docs/

# Repository
repo_name: hantang/hantang.github.io
repo_url: https://github.com/hantang/hantang.github.io
# edit_uri: tree/main

theme:
  name: material
  # language: "zh"
  icon:
    logo: material/sprout
  font:
    text: Helvetica Neue, Roboto
    code: Fira Mono, Fira Code, Roboto Mono
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - announce.dismiss
    - content.action.view
    - content.code.annotations
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.path
    - navigation.sections
    - navigation.tabs
    # - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - toc.follow
    - toc.integrate

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tilde
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
      toc_depth: 4
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
          percent_encode: true
  - tables
  - mdx_truly_sane_lists

extra_javascript:
  - static/js/katex.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/webfontloader@1.6.28/webfontloader.js

extra_css:
  - https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hantang

plugins:
  - search
  - tags:
      tags_file: blog/tags.md
  - blog:
      # blog_dir: .
      blog_toc: true
      authors: true
      pagination_keep_content: true
      pagination_format: "~2~"
      pagination_per_page: 5
      draft_on_serve: true
      post_url_format: "{file}"
      post_date_format: medium
  - rss:
      match_path: blogs/posts/.*
      date_from_meta:
        as_creation: date
      categories:
        - categories
        - tags
  - git-revision-date-localized
  # - awesome-pages
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true

exclude_docs: |
  /drafts/

# Page tree
nav:
  - Home: index.md
  - Project: project/index.md
  - Essay: blog/essay/index.md
  - Post: blog/index.md
  - About: about/index.md
